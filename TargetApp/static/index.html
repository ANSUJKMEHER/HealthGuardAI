<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoPulse | High-Frequency Trading Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.08), transparent 25%);
            color: #f8fafc;
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(51, 65, 85, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
        .price-flash-up {
            animation: flash-green 1s ease-out;
        }
        .price-flash-down {
            animation: flash-red 1s ease-out;
        }
        @keyframes flash-green {
            0% { color: #4ade80; text-shadow: 0 0 15px rgba(74, 222, 128, 0.5); }
            100% { color: #f8fafc; text-shadow: none; }
        }
        @keyframes flash-red {
            0% { color: #f87171; text-shadow: 0 0 15px rgba(248, 113, 113, 0.5); }
            100% { color: #f8fafc; text-shadow: none; }
        }
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 9999;
            position: absolute;
            pointer-events: none;
            background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(56,189,248,0.1) 50%, rgba(0,0,0,0) 100%);
            opacity: 0.1;
            animation: scanline 8s linear infinite;
        }
        @keyframes scanline {
            0% { transform: translateY(-100vh); }
            100% { transform: translateY(100vh); }
        }
    </style>
</head>
<body class="relative overflow-hidden flex flex-col items-center justify-center p-4">
    <div class="scanline"></div>
    
    <div class="glass-panel rounded-2xl w-full max-w-2xl p-8 relative z-10">
        <!-- Header -->
        <div class="flex justify-between items-start mb-8">
            <div>
                <div class="flex items-center gap-3 mb-1">
                    <div class="bg-blue-500/20 p-2 rounded-lg border border-blue-500/30">
                        <i data-lucide="activity" class="text-blue-400 w-6 h-6"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold tracking-tight bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent uppercase tracking-wider">CryptoPulse Engine</h1>
                    </div>
                </div>
                <p class="text-slate-400 text-sm ml-12">High-Frequency Automated Trading System</p>
            </div>
            <div class="flex items-center gap-2 bg-slate-800/50 px-3 py-1.5 rounded-full border border-slate-700">
                <span class="relative flex h-3 w-3">
                    <span id="ping-ring" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span id="ping-dot" class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </span>
                <span id="system-status" class="text-xs font-semibold text-emerald-400 uppercase tracking-wider">System Online</span>
            </div>
        </div>

        <!-- Ticker Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8" id="tickers">
            <!-- Rendered by JS -->
        </div>

        <!-- Metrics Footer -->
        <div class="flex flex-col sm:flex-row justify-between items-center pt-6 border-t border-slate-800/50 text-xs text-slate-500 gap-4">
            <div class="flex gap-6">
                <div class="flex items-center gap-2">
                    <i data-lucide="cpu" class="w-4 h-4"></i>
                    <span id="cpu-load" class="font-mono">Load: 12%</span>
                </div>
                <div class="flex items-center gap-2">
                    <i data-lucide="server" class="w-4 h-4"></i>
                    <span id="mem-load" class="font-mono">Mem: 45MB</span>
                </div>
            </div>
            
            <a href="/admin" class="flex items-center gap-2 px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg border border-slate-700 transition-colors group">
                <i data-lucide="settings-2" class="w-4 h-4 group-hover:rotate-90 transition-transform"></i>
                Chaos Control Panel
            </a>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        let previousPrices = {};
        const assets = [
            { id: 'BTC', name: 'Bitcoin', icon: 'bitcoin', color: 'text-orange-400' },
            { id: 'ETH', name: 'Ethereum', icon: 'hexagon', color: 'text-purple-400' },
            { id: 'GOLD', name: 'Gold/oz', icon: 'coins', color: 'text-yellow-400' },
            { id: 'SILVER', name: 'Silver/oz', icon: 'circle-dashed', color: 'text-slate-300' }
        ];

        // Initialize grid
        const grid = document.getElementById('tickers');
        grid.innerHTML = assets.map(a => `
            <div class="bg-slate-800/40 border border-slate-700/50 rounded-xl p-5 flex flex-col gap-2 relative overflow-hidden group hover:border-slate-600 transition-colors">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-2">
                        <i data-lucide="${a.icon}" class="w-5 h-5 ${a.color}"></i>
                        <span class="font-semibold text-slate-300">${a.name}</span>
                    </div>
                    <span class="text-xs font-mono text-slate-500 bg-slate-900/50 px-2 py-1 rounded">${a.id}/USD</span>
                </div>
                <div class="text-2xl font-mono font-bold tracking-tight text-white mt-2" id="price-${a.id}">
                    $---,---.--
                </div>
            </div>
        `).join('');
        lucide.createIcons();

        async function fetchSystemData() {
            try {
                // Fetch Prices
                const response = await fetch('/api');
                if (!response.ok) throw new Error('API down');
                const data = await response.json();
                
                // Fetch Metrics
                const metricsRes = await fetch('/system/metrics');
                if (metricsRes.ok) {
                    const metrics = await metricsRes.json();
                    document.getElementById('cpu-load').innerText = `Load: ${metrics.cpu_percent}%`;
                    document.getElementById('mem-load').innerText = `Mem: ${metrics.memory_mb}MB`;
                }

                // Set status online
                document.getElementById('system-status').innerText = 'System Online';
                document.getElementById('system-status').className = 'text-xs font-semibold text-emerald-400 uppercase tracking-wider';
                document.getElementById('ping-ring').style.display = 'block';
                document.getElementById('ping-dot').className = 'relative inline-flex rounded-full h-3 w-3 bg-emerald-500';

                // Update UI
                const prices = data.market_data;
                Object.keys(prices).forEach(asset => {
                    const el = document.getElementById(`price-${asset}`);
                    if(!el) return;
                    
                    const price = prices[asset];
                    const oldPrice = previousPrices[asset] || price;
                    
                    const formatted = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(price);
                    
                    if (price !== oldPrice) {
                        el.classList.remove('price-flash-up', 'price-flash-down');
                        void el.offsetWidth; // Trigger reflow
                        el.classList.add(price > oldPrice ? 'price-flash-up' : 'price-flash-down');
                    }
                    
                    el.innerText = formatted;
                    previousPrices[asset] = price;
                });

            } catch (error) {
                console.error('System degraded:', error);
                document.getElementById('system-status').innerText = 'System Degraded';
                document.getElementById('system-status').className = 'text-xs font-semibold text-red-400 uppercase tracking-wider';
                document.getElementById('ping-ring').style.display = 'none';
                document.getElementById('ping-dot').className = 'relative inline-flex rounded-full h-3 w-3 bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.8)]';
            }
        }

        setInterval(fetchSystemData, 1000);
        fetchSystemData();
    </script>
</body>
</html>
