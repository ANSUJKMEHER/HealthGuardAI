<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoPulse | Real-Time Market Data</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e293b;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 400px;
            text-align: center;
            border: 1px solid #334155;
        }
        h1 {
            color: #38bdf8;
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #22c55e;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px #22c55e;
        }
        .live-tag {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ticker-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid #334155;
        }
        .ticker-item:last-child {
            border-bottom: none;
        }
        .asset-name {
            font-weight: bold;
            font-size: 1.2rem;
        }
        .asset-price {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 1.2rem;
            color: #f8fafc;
        }
        .price-up { color: #22c55e; }
        .price-down { color: #ef4444; }
        
        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #64748b;
        }
        .admin-link {
            color: #38bdf8;
            text-decoration: none;
            margin-top: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>CryptoPulse</h1>
        <div class="live-tag">
            <span class="status-dot"></span> LIVE MARKET FEED
        </div>

        <div id="tickers">
            <div class="ticker-item">
                <span class="asset-name">BTC/USD</span>
                <span class="asset-price" id="price-BTC">Loading...</span>
            </div>
            <div class="ticker-item">
                <span class="asset-name">ETH/USD</span>
                <span class="asset-price" id="price-ETH">Loading...</span>
            </div>
            <div class="ticker-item">
                <span class="asset-name">GOLD/oz</span>
                <span class="asset-price" id="price-GOLD">Loading...</span>
            </div>
            <div class="ticker-item">
                <span class="asset-name">SILVER/oz</span>
                <span class="asset-price" id="price-SILVER">Loading...</span>
            </div>
        </div>

        <div class="footer">
            High Frequency Engine v2.0<br>
            <a href="/admin" class="admin-link">→ Admin Control Panel</a>
        </div>
    </div>

    <script>
        async function fetchPrices() {
            try {
                const response = await fetch('/api');
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                
                const prices = data.market_data;
                updatePrice('BTC', prices.BTC);
                updatePrice('ETH', prices.ETH);
                updatePrice('GOLD', prices.GOLD);
                updatePrice('SILVER', prices.SILVER);
                
                document.querySelector('.status-dot').style.backgroundColor = '#22c55e';
            } catch (error) {
                console.error('Error fetching prices:', error);
                document.querySelector('.status-dot').style.backgroundColor = '#ef4444'; // Red if offline
            }
        }

        function updatePrice(asset, price) {
            const el = document.getElementById(`price-${asset}`);
            const oldPrice = parseFloat(el.innerText.replace(/[$,]/g, '')) || 0;
            
            // Format currency
            const formatted = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(price);
            el.innerText = formatted;

            // Flash colors
            if (price > oldPrice) {
                el.style.color = '#22c55e';
            } else if (price < oldPrice) {
                el.style.color = '#ef4444';
            }
        }

        // Poll every 1s
        setInterval(fetchPrices, 1000);
        fetchPrices();
    </script>
</body>
</html>
